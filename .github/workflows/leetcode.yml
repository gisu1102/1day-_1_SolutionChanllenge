name: LeetHub Setting

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  leethub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Check if LeetHub Commit
        id: check_leethub
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B | tail -n 1)
          echo "Latest commit message: $COMMIT_MSG"

          if [[ "$COMMIT_MSG" == Time:* && "$COMMIT_MSG" == *"- LeetHub" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "commit_msg=${COMMIT_MSG}" >> $GITHUB_OUTPUT
            echo "LeetHub 커밋 확인 ✅"
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
            echo "LeetHub 커밋 아님, 스킵 ❌"
          fi

      - name: Detect and Move Package
        if: steps.check_leethub.outputs.should_run == 'true'
        env:
          COMMIT_MSG: ${{ steps.check_leethub.outputs.commit_msg }}
        run: |
          EXCLUDE_DIRS=("LeetCode" "백준" "프로그래머스" ".github")
          ROOT_DIR="LeetCode"
          PACKAGE_NAME=""

          # 1. 루트에 존재하는 문제풀이 패키지 탐색
          for DIR in */; do
            DIR="${DIR%/}"
            SKIP=false
            for EX in "${EXCLUDE_DIRS[@]}"; do
              if [[ "$DIR" == "$EX" ]]; then
                SKIP=true
                break
              fi
            done
            if [[ "$SKIP" == false ]]; then
              PACKAGE_NAME="$DIR"
              echo "루트에 위치한 문제풀이 패키지 발견: $PACKAGE_NAME"
              break
            fi
          done

          if [ -z "$PACKAGE_NAME" ]; then
            echo "이동할 패키지 없음, 스킵"
            exit 0
          fi

          # 2. 난이도 추출 (루트 패키지 → 기존 LeetCode 디렉토리 순서로 README 탐색)
          LEVEL="Unknown"
          README_CANDIDATES=(
            "$PACKAGE_NAME/README.md"
            "$ROOT_DIR/$PACKAGE_NAME/README.md"
          )
          # LeetCode/*/패키지명/README.md 도 탐색
          for dir in "$ROOT_DIR"/*/; do
            if [ -f "${dir}$PACKAGE_NAME/README.md" ]; then
              README_CANDIDATES+=("${dir}$PACKAGE_NAME/README.md")
            fi
          done

          for README_PATH in "${README_CANDIDATES[@]}"; do
            if [ -f "$README_PATH" ]; then
              echo "README 발견: $README_PATH"
              EXTRACTED=$(grep -oP '(?<=<h3>).*?(?=</h3>)' "$README_PATH" | head -n 1)
              if [ -n "$EXTRACTED" ]; then
                LEVEL="$EXTRACTED"
                echo "난이도 추출 성공: $LEVEL"
                break
              fi
            fi
          done
          echo "최종 난이도: $LEVEL"

          # 3. 기존 디렉토리 탐색 및 이동
          FOUND_EXISTING_PATH=""
          for dir in "$ROOT_DIR"/*/; do
            if [ -d "${dir}$PACKAGE_NAME" ]; then
              FOUND_EXISTING_PATH="${dir%/}"
              echo "기존 디렉토리 발견: ${dir}$PACKAGE_NAME"
              break
            fi
          done

          # flat 구조(LeetCode/패키지명) → 서브폴더로 변환
          if [ -d "$ROOT_DIR/$PACKAGE_NAME" ] && [ -z "$FOUND_EXISTING_PATH" ]; then
            echo "flat 구조 감지 → 서브폴더 변환: $ROOT_DIR/$LEVEL/$PACKAGE_NAME"
            mkdir -p "$ROOT_DIR/$LEVEL"
            mv "$ROOT_DIR/$PACKAGE_NAME" "$ROOT_DIR/$LEVEL/"
            FOUND_EXISTING_PATH="$ROOT_DIR/$LEVEL"
          fi

          # 기존 위치로 병합 이동
          if [ -n "$FOUND_EXISTING_PATH" ]; then
            DEST="$FOUND_EXISTING_PATH/$PACKAGE_NAME"
            echo "→ 기존 디렉토리로 병합 이동: $DEST"
            cp -r "$PACKAGE_NAME"/* "$DEST"/
            rm -rf "$PACKAGE_NAME"
          else
            # 새로 이동
            DEST="$ROOT_DIR/$LEVEL/$PACKAGE_NAME"
            echo "→ 새 디렉토리로 이동: $DEST"
            mkdir -p "$ROOT_DIR/$LEVEL"
            mv "$PACKAGE_NAME" "$ROOT_DIR/$LEVEL/"
          fi

          # 4. 커밋 및 푸시
          git config --global user.name gisu1102
          git config --global user.email gisu1102@gmail.com

          git add .
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git pull --rebase origin main
          git push
